#### general settings
name: Baselines_MIMIC4
train_type: baseline
eval_type: homo-graph
gpu_ids: '0'

#### datasets
datasets:
  name: mimic3
  dataset_path: "./data/mimic3_objects/mimic3_dp_dataset.pkl"

#### Logging settings
logging:
  mode: disabled

#### Checkpoint settings
checkpoint:
  path: "./checkpoints/AdaCare/"
  save_checkpoint_freq: 2

#### Optimizer settings
optimizer:
  opt_method: "ADAM"
  lr: 0.0005 # Learning rate
  weight_decay: 0.001

#### training settings: learning rate scheme, loss, optimizer
train:
  num_epochs: 2
  batch_size: 4096
  baseline_name: "AdaCare"
  task: "readm"
